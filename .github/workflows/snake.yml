name: Generate Snake Contribution Animation

on:
  schedule:
    - cron: "0 0 * * *"  # runs once a day
  workflow_dispatch:      # lets you trigger it manually anytime
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate the snake game SVG
        uses: Platane/snk@v3
        with:
          github_user_name: Vaibhavsaini14
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#B57BFF&color_dots=#161B22,#2d1b4e,#4a2a7a,#7b4fc7,#B57BFF

      - name: Push generated files to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
